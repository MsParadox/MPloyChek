
name: MPloyChek CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'

jobs:
  # ── Job 1: Backend Tests ─────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost/test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit + Flow tests (no DB required)
        run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_must_be_32_chars_long!

      - name: Prisma Integration tests (against Neon test branch)
        if: ${{ secrets.DATABASE_URL_TEST != '' }}
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_must_be_32_chars_long!
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend/coverage
          flags: backend
        continue-on-error: true

  # ── Job 2: Frontend Build ────────────────────────────────
  test-frontend:
    name: 🧪 Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Angular production build
        run: npx ng build --configuration production --no-progress
        env:
          NODE_OPTIONS: --max_old_space_size=4096

  # ── Job 3: Deploy Backend → Render ──────────────────────
  deploy-backend:
    name: 🚀 Deploy → Render
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.RENDER_BACKEND_URL }}
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" && echo "✅ Render deploy triggered"
          else
            echo "ℹ️  Render auto-deploys from GitHub push"
          fi

  # ── Job 4: Deploy Frontend → Vercel ─────────────────────
  deploy-frontend:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.VERCEL_FRONTEND_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm install -g vercel
          cd frontend && vercel --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Job 5: CI Summary ────────────────────────────────────
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## MPloyChek — CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests  | ${{ needs.test-backend.result  }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Coverage:** Unit · Integration · E2E · Workflow" >> $GITHUB_STEP_SUMMARY
          echo "**Infrastructure:** Render · Vercel · Neon " >> $GITHUB_STEP_SUMMARY
