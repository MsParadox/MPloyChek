name: MPloyChek PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: 🔍 Backend — Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://x:x@localhost/x

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit + integration + E2E tests (with coverage gate)
        run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_jwt_secret_must_be_32_chars_long!

  frontend:
    name: 🅰️ Frontend — Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Angular production build (AOT + strict templates)
        run: npx ng build --configuration production --no-progress
        env:
          NODE_OPTIONS: --max_old_space_size=4096

  summary:
    name: 📊 PR Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            const be = '${{ needs.backend.result }}';
            const fe = '${{ needs.frontend.result }}';
            const icon = (r) => r === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## MPloyChek PR Checks',
                '| Check | Result |',
                '|---|---|',
                `| Backend (tsc + 244 tests + coverage) | ${icon(be)} ${be} |`,
                `| Frontend (AOT production build) | ${icon(fe)} ${fe} |`,
                '',
                `Commit: \`${{ github.sha }}\``,
              ].join('\n')
            })
